<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        .game-title {
        font-family: 'Permanent Marker', cursive;
        font-size: 3rem; /* Increased size for a bigger impact */
        margin-top: 5px;
        margin-bottom: 30px;
        color: #1f1e1e;
        /* Rotation gives it that "hastily written" look */
        transform: rotate(-2deg); 
        display: block;
    }
        body { margin: 0; background: #1667b8; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* ── Lobby ─────────────────────────────────────────────────── */
        #join-screen { position: fixed; inset: 0; background: #1a252f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .lobby-box { background: #34495e; padding: 40px; border-radius: 20px; text-align: Center; margin-top: 0px; width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 2px solid #444; }
        .selector-container { display: flex; align-items: center; justify-content: space-between; background: #2c3e50; margin: 10px 0; padding: 10px; border-radius: 10px; border: 1px solid #555; }
        .arrow-btn { background: #f1c40f; border: none; color: #2c3e50; font-weight: bold; padding: 10px 20px; cursor: pointer; border-radius: 8px; font-size: 18px; }
        #char-display { font-size: 100px; min-width: 60px; }
        #bg-preview { width: 75px; height: 75px; border-radius: 8px; border: 2px solid white; }
        .play-btn { width: 100%; padding: 15px; margin-top: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .play-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .back-link { background: none; border: none; color: #bdc3c7; margin-top: 20px; cursor: pointer; text-decoration: underline; font-size: 14px; display: block; }

        /* ── Room code ─────────────────────────────────────────────── */
        #room-code-banner { background: #1a252f; border: 3px solid #f1c40f; border-radius: 14px; padding: 16px 24px; margin-bottom: 18px; display: none; }
        #room-code-banner p { margin: 0 0 6px; color: #bdc3c7; font-size: 13px; letter-spacing: 1px; }
        #room-code-value { font-size: 44px; font-weight: 900; letter-spacing: 12px; color: #f1c40f; cursor: pointer; }
        #copy-hint { font-size: 11px; color: #7f8c8d; margin-top: 4px; }
        .code-input { width: 85%; padding: 14px; margin-top: 10px; border-radius: 10px; border: 3px solid #f1c40f; background: #2c3e50; color: white; font-size: 28px; font-weight: bold; letter-spacing: 10px; text-align: center; outline: none; text-transform: uppercase; }
        .code-input::placeholder { color: #7f8c8d; letter-spacing: 6px; font-size: 18px; }
        #join-error { color: #e74c3c; font-size: 13px; margin-top: 8px; min-height: 18px; }

        /* ── Game Layout ────────────────────────────────────────────── */
        .game-container { display: flex; gap: 20px; visibility: hidden; }

        /* ── Scoreboard ─────────────────────────────────────────────── */
        #scoreboard { width: 220px; background: #2c3e50; padding: 15px; border-radius: 8px; border: 2px solid #34495e; }
        .score-entry {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            position: relative;
            transition: box-shadow 0.3s;
        }
        /* Green glow = already guessed correctly this round */
        .score-entry.guessed-correct {
            box-shadow: 0 0 0 3px #2ecc71, 0 0 14px 4px rgba(46,204,113,0.55);
        }
        /* Gold pulsing glow = this player is drawing */
        .score-entry.is-drawing {
            box-shadow: 0 0 0 3px #f1c40f, 0 0 14px 6px rgba(241,196,15,0.5);
            animation: drawPulse 1.4s ease-in-out infinite;
        }
        @keyframes drawPulse {
            0%, 100% { box-shadow: 0 0 0 3px #f1c40f, 0 0 12px 4px rgba(241,196,15,0.4); }
            50%       { box-shadow: 0 0 0 3px #f1c40f, 0 0 22px 8px rgba(241,196,15,0.7); }
        }
        .drawing-badge {
            font-size: 13px;
            margin-left: auto;
            background: #f1c40f;
            color: #2c3e50;
            border-radius: 6px;
            padding: 2px 6px;
            font-weight: 900;
            white-space: nowrap;
        }
        .correct-badge {
            font-size: 16px;
            margin-left: auto;
        }

        /* ── Canvas ─────────────────────────────────────────────────── */
        canvas { background: white; border: 4px solid #bdc3c7; border-radius: 8px; touch-action: none; cursor: none; }

        /* ── Toolbox ────────────────────────────────────────────────── */
        #toolbox { margin-top:15px; background:#34495e; padding:15px; border-radius:12px; display:flex; gap:12px; align-items:center; justify-content:center; border: 1px solid #444; }
        .color-palette { display:grid; grid-template-columns: repeat(6,1fr); gap:5px; }
        .color-btn { width:26px; height:26px; border:1px solid rgba(0,0,0,0.2); cursor:pointer; border-radius:4px; transition: transform 0.1s; }
        .color-btn:hover { transform: scale(1.2); }
        .tool-btn { width:45px; height:45px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; border-radius:8px; background:#2c3e50; color:white; font-size:20px; }
        .active-tool { background:#27ae60 !important; border:2px solid white; }

        /* ── Chat ───────────────────────────────────────────────────── */
        #chat-box { width:300px; background:#ecf0f1; color:black; border-radius:8px; display:flex; flex-direction:column; height:580px; }
        #messages { flex:1; padding:10px; overflow-y:auto; font-size:14px; background:#fff; border-radius:8px 8px 0 0; }
        #chat-input { padding:15px; border:none; border-top:1px solid #ddd; outline:none; border-radius:0 0 8px 8px; font-size:15px; }

        /* ── Word selection ─────────────────────────────────────────── */
        #word-selection-screen { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(44,62,80,0.98); padding:40px; border:4px solid #f1c40f; z-index:200; border-radius:20px; text-align:center; }

        /* ── Round-over popup ───────────────────────────────────────── */
        #round-over-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 400;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #round-over-screen.show { display: flex; }
        .round-over-box {
            background: #2c3e50;
            border: 3px solid #f1c40f;
            border-radius: 20px;
            padding: 36px 48px;
            min-width: 360px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .round-over-box h2 { color: #f1c40f; margin: 0 0 6px; font-size: 28px; }
        .round-over-box .word-reveal { color: #ecf0f1; font-size: 15px; margin-bottom: 20px; }
        .round-score-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
        }
        .round-score-row .pts-earned {
            margin-left: auto;
            font-size: 18px;
            font-weight: 900;
            color: #2ecc71;
        }
        .round-score-row .pts-earned.zero { color: #7f8c8d; }
        .round-over-box .countdown-line { margin-top: 18px; color: #bdc3c7; font-size: 14px; }

        /* ── Game Over ──────────────────────────────────────────────── */
        #game-over-screen { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:500; align-items:center; justify-content:center; flex-direction:column; }
        #game-over-screen.show { display:flex; }
        .podium-entry { padding:15px 30px; margin:6px; border-radius:12px; font-size:20px; font-weight:bold; min-width:280px; display:flex; justify-content:space-between; }
        #play-again-btn { margin-top:25px; padding:15px 40px; background:#27ae60; border:none; color:white; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<!-- ═══ LOBBY ═══════════════════════════════════════════════════════════════ -->
<div id="join-screen">
    <div class="lobby-box">
        <h1 class="game-title">Roughly Drawn</h1>

        <div id="setup-ui">
            <input type="text" id="username-input" placeholder="Nickname..." maxlength="12"
                style="width:85%;padding:12px;margin-bottom:0px;border-radius:8px;border:none;font-size:16px;outline:none;">
            <p style="font-size:20px;color:#bdc3c7;">CHARACTER</p>
            <div class="selector-container">
                <button class="arrow-btn" onclick="changeChar(-1)">◀</button>
                <div id="char-display"><img src="images/1.png" style="width:100px;height:100px;"></div>
                <button class="arrow-btn" onclick="changeChar(1)">▶</button>
            </div>
            <p style="font-size:20px;color:#bdc3c7;margin-top:10px;">COLOR</p>
            <div class="selector-container">
                <button class="arrow-btn" onclick="changeColor(-1)">◀</button>
                <div id="bg-preview" style="background:#e74c3c;"></div>
                <button class="arrow-btn" onclick="changeColor(1)">▶</button>
            </div>
            <button class="play-btn" onclick="showMenu()">PLAY</button>
        </div>

        <div id="game-menu-ui" style="display:none;">
            <button class="play-btn" style="background:#f39c12;" onclick="showHostFlow()">🎮 HOST GAME</button>
            <button class="play-btn" style="background:#3498db;" onclick="showJoinFlow()">🔑 JOIN GAME</button>
            <button class="back-link" onclick="backToCustomization()">← Back</button>
        </div>

        <div id="host-flow-ui" style="display:none;">
            <div id="room-code-banner">
                <p>SHARE THIS CODE WITH FRIENDS</p>
                <div id="room-code-value" onclick="copyCode()" title="Click to copy">····</div>
                <div id="copy-hint">Click code to copy</div>
            </div>
            <div id="player-list" style="margin-bottom:16px;"></div>
            <button onclick="startGame()" class="play-btn" style="background:#f1c40f;color:#2c3e50;">▶ START MATCH</button>
            <button class="back-link" onclick="backToMenu()">← Back to menu</button>
        </div>

        <div id="join-flow-ui" style="display:none;">
            <p style="color:#bdc3c7;margin-bottom:6px;">Enter your friend's room code:</p>
            <input id="code-input" class="code-input" maxlength="4" placeholder="XXXX"
                oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
                onkeypress="if(event.key==='Enter') submitJoin()">
            <div id="join-error"></div>
            <button class="play-btn" style="background:#3498db;" onclick="submitJoin()">JOIN →</button>
            <button class="back-link" onclick="backToMenu()">← Back to menu</button>
        </div>

        <div id="join-lobby-ui" style="display:none;">
            <p style="color:#bdc3c7;font-size:13px;margin-bottom:4px;">ROOM CODE</p>
            <div style="font-size:30px;font-weight:900;letter-spacing:8px;color:#f1c40f;margin-bottom:16px;" id="joined-code-display"></div>
            <div id="join-player-list" style="margin-bottom:16px;"></div>
            <p style="font-size:14px;color:#bdc3c7;">⏳ Waiting for host to start...</p>
        </div>
    </div>
</div>

<!-- ═══ ROUND OVER POPUP ════════════════════════════════════════════════════ -->
<div id="round-over-screen">
    <div class="round-over-box">
        <h2 id="round-over-title">Round Over!</h2>
        <p class="word-reveal" id="round-over-word"></p>
        <div id="round-score-list"></div>
        <p class="countdown-line">Next round in <span id="round-countdown">5</span>s…</p>
    </div>
</div>

<!-- ═══ GAME OVER ═══════════════════════════════════════════════════════════ -->
<div id="game-over-screen">
    <h1 style="color:#f1c40f;font-size:42px;margin-bottom:10px;">🏆 GAME OVER!</h1>
    <div id="podium-list"></div>
    <button id="play-again-btn" onclick="location.reload()">Play Again</button>
</div>

<!-- ═══ MAIN GAME ═══════════════════════════════════════════════════════════ -->
<div class="game-container" id="main-game">
    <div id="scoreboard">
        <h3 style="text-align:center;color:#f1c40f;">Players</h3>
        <div id="score-list"></div>
    </div>

    <div id="word-selection-screen">
        <h2>Choose a Word</h2>
        <p style="color:#bdc3c7;font-size:13px;">Auto-selects in <span id="sel-countdown">15</span>s</p>
        <div id="word-options" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>

    <div style="text-align:center;">
        <div id="word-display" style="background:#27ae60;padding:12px;border-radius:8px;font-size:22px;font-weight:bold;letter-spacing:4px;margin-bottom:10px;">???</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-weight:bold;">
            <div id="round-counter">Round 1/3</div>
            <div id="timer-display" style="color:#e74c3c;">60s</div>
        </div>
        <canvas id="gameCanvas" width="700" height="400"></canvas>

        <div id="toolbox" style="display:none;">
            <div class="color-palette">
                <div class="color-btn" style="background:#000000;" onclick="setColor('#000000')"></div>
                <div class="color-btn" style="background:#ffffff;border:1px solid #999;" onclick="setColor('#ffffff')"></div>
                <div class="color-btn" style="background:#ff0000;" onclick="setColor('#ff0000')"></div>
                <div class="color-btn" style="background:#0000ff;" onclick="setColor('#0000ff')"></div>
                <div class="color-btn" style="background:#00cc00;" onclick="setColor('#00cc00')"></div>
                <div class="color-btn" style="background:#ffff00;" onclick="setColor('#ffff00')"></div>
                <div class="color-btn" style="background:#ffa500;" onclick="setColor('#ffa500')"></div>
                <div class="color-btn" style="background:#800080;" onclick="setColor('#800080')"></div>
                <div class="color-btn" style="background:#ff69b4;" onclick="setColor('#ff69b4')"></div>
                <div class="color-btn" style="background:#00ffff;" onclick="setColor('#00ffff')"></div>
                <div class="color-btn" style="background:#8b4513;" onclick="setColor('#8b4513')"></div>
                <input type="color" oninput="setColor(this.value)" style="width:26px;height:26px;border:none;padding:0;background:none;cursor:pointer;">
            </div>
            <div style="width:2px;height:40px;background:#444;"></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                <svg id="brush-preview" width="54" height="54" viewBox="0 0 54 54" style="flex-shrink:0;">
                    <circle id="brush-circle" cx="27" cy="27" r="2.5" fill="rgba(0,0,0,0.18)" stroke="#222" stroke-width="1.5"/>
                </svg>
                <input type="range" id="size-slider" min="4" max="50" value="5"
                    oninput="currentSize=+this.value; document.getElementById('sz-txt').innerText=this.value+'px'; updateCursor(); updateBrushPreview();"
                    style="width:80px;">
                <span id="sz-txt" style="font-size:10px;">5px</span>
            </div>
            <button class="tool-btn active-tool" id="pen-tool" onclick="setTool('pen')" title="Pen">✏️</button>
            <button class="tool-btn" id="eraser-tool" onclick="setTool('eraser')" title="Eraser">🧹</button>
            <button class="tool-btn" id="fill-tool" onclick="setTool('fill')" title="Fill">🪣</button>
            <button class="tool-btn" onclick="undo()" title="Undo">↩️</button>
            <button class="tool-btn" onclick="redo()" title="Redo">↪️</button>
            <button onclick="socket.emit('requestClear')" class="tool-btn" style="background:#e74c3c;font-size:12px;width:auto;padding:0 10px;">Clear</button>
        </div>
    </div>

    <div id="chat-box">
        <div id="messages"></div>
        <input type="text" id="chat-input" placeholder="Type your guess...">
    </div>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let isDrawer = false, drawing = false, lastPos = { x: 0, y: 0 };
    let currentColor = "#000000", currentSize = 5, currentTool = 'pen';
    let drawHistory = [], redoStack = [];
    let currentDrawerID = null; // track who is drawing for the scoreboard

    const avatars = [
    "images/1.png",
    "images/2.png",
    "images/3.png",
    "images/4.png"
    ];
    const nameColors = ["#e74c3c","#3498db","#2ecc71","#f1c40f","#9b59b6","#e67e22","#1abc9c","#8e44ad"];
    let charIdx = 0, colorIdx = 0;

    // ── Custom circle cursor ────────────────────────────────────────────────
    function updateCursor() {
        if (!isDrawer || currentTool === 'fill') {
            canvas.style.cursor = isDrawer ? 'crosshair' : 'default';
            return;
        }
        const rawSize = currentTool === 'eraser' ? currentSize * 2 : parseInt(currentSize);
        const r = Math.max(4, rawSize / 2);
        const dim = Math.ceil(r * 2) + 6; // a little padding so the edge isn't clipped
        const cx = dim / 2, cy = dim / 2;

        const stroke = currentTool === 'eraser' ? '#888888' : '#222222';
        const fill   = currentTool === 'eraser' ? 'rgba(200,200,200,0.35)' : 'rgba(0,0,0,0.18)';

        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${dim}' height='${dim}'>
            <circle cx='${cx}' cy='${cy}' r='${r - 1}' stroke='${stroke}' stroke-width='1.5' fill='${fill}'/>
        </svg>`;

        canvas.style.cursor = `url("data:image/svg+xml,${encodeURIComponent(svg)}") ${cx} ${cy}, crosshair`;
    }

    // ── Chat input gating ────────────────────────────────────────────────────
    let mySocketId = null;
    socket.on('connect', () => { mySocketId = socket.id; });

    function updateChatState(drawerID, correctGuessers = []) {
        const input = document.getElementById('chat-input');
        const isLocked = (mySocketId === drawerID) || correctGuessers.includes(mySocketId);
        input.disabled = isLocked;
        if (mySocketId === drawerID) {
            input.placeholder = "You're drawing — no chatting!";
            input.style.background = '#f8e8d0';
            input.style.color = '#999';
        } else if (correctGuessers.includes(mySocketId)) {
            input.placeholder = "✅ You guessed it! No hints please 🤫";
            input.style.background = '#d5f5e3';
            input.style.color = '#999';
        } else {
            input.placeholder = 'Type your guess...';
            input.style.background = '';
            input.style.color = '';
        }
    }

    
    function updateBrushPreview() {
        const rawSize = currentTool === 'eraser' ? currentSize * 2 : parseInt(currentSize);
        const r = Math.max(2, Math.min(rawSize / 2, 26)); // clamp to SVG bounds (viewBox 54, centre 27)
        const circle = document.getElementById('brush-circle');
        if (!circle) return;
        circle.setAttribute('r', r);
        if (currentTool === 'eraser') {
            circle.setAttribute('fill', 'rgba(200,200,200,0.45)');
            circle.setAttribute('stroke', '#888');
        } else {
            circle.setAttribute('fill', currentColor === '#ffffff' ? 'rgba(200,200,200,0.6)' : currentColor);
            circle.setAttribute('stroke', '#222');
        }
    }

    
    function userData() { return { name: document.getElementById('username-input').value, avatar: avatars[charIdx], color: nameColors[colorIdx] }; }
    function changeChar(dir) { charIdx = (charIdx + dir + avatars.length) % avatars.length;const display = document.getElementById('char-display');display.innerHTML = `<img src="${avatars[charIdx]}" style="width: 100px; height: 100px; object-fit: contain;">`;}
    function changeColor(dir) { colorIdx = (colorIdx + dir + nameColors.length) % nameColors.length; document.getElementById('bg-preview').style.background = nameColors[colorIdx]; }
    function showMenu() { if (!document.getElementById('username-input').value.trim()) return alert("Enter a nickname first!"); show('game-menu-ui'); }
    function showHostFlow() { show('host-flow-ui'); socket.emit('createRoom', userData()); }
    function showJoinFlow() { show('join-flow-ui'); document.getElementById('join-error').textContent = ''; document.getElementById('code-input').value = ''; setTimeout(() => document.getElementById('code-input').focus(), 50); }
    function submitJoin() { const code = document.getElementById('code-input').value.trim().toUpperCase(); if (code.length !== 4) { document.getElementById('join-error').textContent = 'Please enter a 4-letter code.'; return; } document.getElementById('join-error').textContent = ''; socket.emit('joinRoom', { ...userData(), code }); }
    function backToCustomization() { show('setup-ui'); }
    function backToMenu() { show('game-menu-ui'); }
    function startGame() { socket.emit('startGame'); }
    function show(id) { ['setup-ui','game-menu-ui','host-flow-ui','join-flow-ui','join-lobby-ui'].forEach(s => { document.getElementById(s).style.display = (s === id) ? 'block' : 'none'; }); }
    function copyCode() { const code = document.getElementById('room-code-value').textContent; navigator.clipboard.writeText(code).then(() => { document.getElementById('copy-hint').textContent = '✅ Copied!'; setTimeout(() => document.getElementById('copy-hint').textContent = 'Click code to copy', 2000); }); }

    // ── Room events ─────────────────────────────────────────────────────────
    socket.on('roomCreated', ({ code }) => {
        document.getElementById('room-code-value').textContent = code;
        document.getElementById('room-code-banner').style.display = 'block';
    });
    socket.on('joinSuccess', ({ code }) => { document.getElementById('joined-code-display').textContent = code; show('join-lobby-ui'); });
    socket.on('joinError', msg => { document.getElementById('join-error').textContent = '❌ ' + msg; });

    socket.on('updateLobby', d => {
        ['player-list', 'join-player-list'].forEach(listId => {
            const el = document.getElementById(listId);
            el.innerHTML = '';
            Object.values(d.players).forEach(p => {
                const div = document.createElement('div');
                div.style.cssText = `background:${p.color};padding:10px;margin:5px;border-radius:8px;font-weight:bold;`;
                div.innerHTML = `<img src="${p.avatar}" style="width:24px; vertical-align:middle;"> ${p.nickname}`;
                el.appendChild(div);
            });
        });
    });

    socket.on('gameStarting', () => {
        document.getElementById('join-screen').style.display = 'none';
        document.getElementById('main-game').style.visibility = 'visible';
        clearWithWhite();
    });

    // ── Drawing ─────────────────────────────────────────────────────────────
    function clearWithWhite() { ctx.fillStyle = "white"; ctx.fillRect(0, 0, 700, 400); }

    function setColor(hex) { currentColor = hex; if (currentTool === 'eraser') setTool('pen'); updateCursor(); updateBrushPreview(); }
    function setTool(t) {
        currentTool = t;
        document.getElementById('pen-tool').classList.toggle('active-tool', t === 'pen');
        document.getElementById('eraser-tool').classList.toggle('active-tool', t === 'eraser');
        document.getElementById('fill-tool').classList.toggle('active-tool', t === 'fill');
        updateCursor(); updateBrushPreview();
    }

    function saveHistory() { drawHistory.push(canvas.toDataURL()); redoStack = []; if (drawHistory.length > 20) drawHistory.shift(); }
    function undo() { if (!isDrawer || !drawHistory.length) return; redoStack.push(canvas.toDataURL()); applyState(drawHistory.pop(), true); }
    function redo() { if (!isDrawer || !redoStack.length) return; drawHistory.push(canvas.toDataURL()); applyState(redoStack.pop(), true); }
    function applyState(src, broadcast) { const img = new Image(); img.src = src; img.onload = () => { ctx.clearRect(0,0,700,400); ctx.drawImage(img,0,0); if (broadcast) socket.emit('syncHistory', src); }; }

    function getPos(e) { const r = canvas.getBoundingClientRect(); const src = e.touches ? e.touches[0] : e; return { x: src.clientX - r.left, y: src.clientY - r.top }; }

    function handleStart(e) {
        if (!isDrawer) return;
        e.preventDefault();
        const { x, y } = getPos(e);
        saveHistory();
        if (currentTool === 'fill') { floodFill(Math.floor(x), Math.floor(y), currentColor); socket.emit('fill', { x: Math.floor(x), y: Math.floor(y), color: currentColor }); }
        else { drawing = true; lastPos = { x, y }; }
    }
    function handleMove(e) {
        if (!isDrawer) return;
        e.preventDefault();
        if (!drawing) return;
        const currentPos = getPos(e);
        const strokeColor = currentTool === 'eraser' ? '#ffffff' : currentColor;
        const strokeSize  = currentTool === 'eraser' ? currentSize * 2 : currentSize;
        drawStroke({ lastPos, currentPos, color: strokeColor, size: strokeSize });
        socket.emit('draw', { lastPos, currentPos, color: strokeColor, size: strokeSize });
        lastPos = currentPos;
    }
    function handleEnd() { drawing = false; }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd, { passive: false });

    // Hide system cursor while over canvas for non-drawers too (keeps it clean)
    canvas.addEventListener('mouseenter', () => { if (!isDrawer) canvas.style.cursor = 'default'; else updateCursor(); });
    canvas.addEventListener('mouseleave', () => { canvas.style.cursor = 'default'; });

    function drawStroke(d) {
        ctx.strokeStyle = d.color; ctx.lineWidth = d.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(d.lastPos.x, d.lastPos.y); ctx.lineTo(d.currentPos.x, d.currentPos.y); ctx.stroke();
    }
    function floodFill(startX, startY, fillHex) {
        const img = ctx.getImageData(0,0,700,400), data = img.data;
        const fR=parseInt(fillHex.slice(1,3),16), fG=parseInt(fillHex.slice(3,5),16), fB=parseInt(fillHex.slice(5,7),16);
        const sp=(startY*700+startX)*4, sR=data[sp], sG=data[sp+1], sB=data[sp+2];
        if(sR===fR&&sG===fG&&sB===fB) return;
        const stack=[[startX,startY]], wd=Date.now();
        while(stack.length){
            if(Date.now()-wd>200) break;
            let[x,y]=stack.pop(), p=(y*700+x)*4;
            while(y-->=0&&match(p)) p-=2800; y++; p+=2800;
            let l=false,r=false;
            while(y++<399&&match(p)){
                data[p]=fR;data[p+1]=fG;data[p+2]=fB;data[p+3]=255;
                if(x>0){if(match(p-4)){if(!l){stack.push([x-1,y]);l=true;}}else if(l)l=false;}
                if(x<699){if(match(p+4)){if(!r){stack.push([x+1,y]);r=true;}}else if(r)r=false;}
                p+=2800;
            }
        }
        ctx.putImageData(img,0,0);
        function match(p){return(Math.abs(data[p]-sR)<15&&Math.abs(data[p+1]-sG)<15&&Math.abs(data[p+2]-sB)<15);}
    }

    // ── Scoreboard renderer ─────────────────────────────────────────────────
    // Called with { players, drawerID, correctGuessers }
    function renderScoreboard({ players, drawerID, correctGuessers = [] }) {
        currentDrawerID = drawerID;
        const l = document.getElementById('score-list');
        l.innerHTML = '';
        Object.entries(players).sort((a,b) => b[1].score - a[1].score).forEach(([id, x]) => {
            const div = document.createElement('div');
            div.className = 'score-entry';
            div.style.background = x.color;

            const isThisDrawer = (id === drawerID);
            const hasGuessed   = correctGuessers.includes(id);

            if (isThisDrawer) div.classList.add('is-drawing');
            else if (hasGuessed) div.classList.add('guessed-correct');

            // Avatar + name
            const left = document.createElement('span');
            left.innerHTML = `<img src="${x.avatar}" style="width:20px; vertical-align:middle; margin-right:5px;"> ${x.nickname}`;

            // Score
            const score = document.createElement('span');
            score.style.cssText = 'font-size:13px; opacity:0.85;';
            score.textContent = x.score;

            // Badge (drawing pencil OR green check)
            const badge = document.createElement('span');
            if (isThisDrawer) {
                badge.className = 'drawing-badge';
                badge.textContent = '✏️ DRAWING';
            } else if (hasGuessed) {
                badge.className = 'correct-badge';
                badge.textContent = '✅';
            }

            div.appendChild(left);
            div.appendChild(score);
            div.appendChild(badge);
            l.appendChild(div);
        });
    }

    // ── Round-over popup ────────────────────────────────────────────────────
    let roundCountdownInterval = null;

    socket.on('roundOver', ({ message, word, roundPoints, players, drawerID }) => {
        // Hide word selection if it was open
        document.getElementById('word-selection-screen').style.display = 'none';

        document.getElementById('round-over-title').textContent = message.startsWith('🎉') ? '🎉 Everyone got it!' : message.startsWith('⏰') ? "⏰ Time's Up!" : '🔄 Round Over!';
        document.getElementById('round-over-word').textContent = `The word was: ${word}`;

        const list = document.getElementById('round-score-list');
        list.innerHTML = '';
        Object.entries(players).sort((a,b) => b[1].score - a[1].score).forEach(([id, p]) => {
            const pts = roundPoints[id] || 0;
            const row = document.createElement('div');
            row.className = 'round-score-row';
            row.style.color = 'white';

            const nameSpan = document.createElement('span');
            nameSpan.innerHTML = `<img src="${p.avatar}" style="width:24px; height:24px; vertical-align:middle; margin-right:8px; border-radius:4px;"> ${p.nickname}`;
            if (id === drawerID) nameSpan.textContent += ' ✏️';

            const ptsSpan = document.createElement('span');
            ptsSpan.className = 'pts-earned' + (pts === 0 ? ' zero' : '');
            ptsSpan.textContent = pts > 0 ? `+${pts}` : '—';

            const totalSpan = document.createElement('span');
            totalSpan.style.cssText = 'font-size:12px;color:#bdc3c7;margin-left:6px;';
            totalSpan.textContent = `(${p.score} total)`;

            row.appendChild(nameSpan);
            row.appendChild(ptsSpan);
            row.appendChild(totalSpan);
            list.appendChild(row);
        });

        // Countdown
        let secs = 5;
        document.getElementById('round-countdown').textContent = secs;
        document.getElementById('round-over-screen').classList.add('show');
        clearInterval(roundCountdownInterval);
        roundCountdownInterval = setInterval(() => {
            secs--;
            document.getElementById('round-countdown').textContent = secs;
            if (secs <= 0) { clearInterval(roundCountdownInterval); document.getElementById('round-over-screen').classList.remove('show'); }
        }, 1000);
    });

    // ── Socket game events ───────────────────────────────────────────────────
    let selCountdownInterval = null;

    socket.on('requestWordChoice', cs => {
        const s = document.getElementById('word-selection-screen'), o = document.getElementById('word-options'), cd = document.getElementById('sel-countdown');
        s.style.display = 'block'; o.innerHTML = '';
        let secs = 15; cd.textContent = secs;
        clearInterval(selCountdownInterval);
        selCountdownInterval = setInterval(() => { secs--; cd.textContent = secs; if(secs<=0) clearInterval(selCountdownInterval); }, 1000);
        cs.forEach(w => {
            const b = document.createElement('button'); b.textContent = w; b.className = 'play-btn';
            b.onclick = () => { socket.emit('wordSelected', w); s.style.display = 'none'; clearInterval(selCountdownInterval); };
            o.appendChild(b);
        });
    });

    socket.on('newRound', d => {
        isDrawer = (d.role === 'drawer');
        currentDrawerID = d.drawerID;
        document.getElementById('toolbox').style.display = isDrawer ? 'flex' : 'none';
        document.getElementById('word-display').innerText = isDrawer ? "✏️ DRAW: " + d.word : d.word;
        document.getElementById('word-display').style.background = isDrawer ? '#e67e22' : '#27ae60';
        document.getElementById('word-selection-screen').style.display = 'none';
        document.getElementById('round-over-screen').classList.remove('show');
        clearWithWhite(); drawHistory = []; redoStack = [];
        updateCursor();
        updateChatState(d.drawerID, []);
    });

    socket.on('updateRoundDisplay', d => { document.getElementById('round-counter').innerText = `Round ${d.current}/${d.total}`; });

    // scoreboard now sends { players, drawerID, correctGuessers }
    socket.on('updateScoreboard', data => { renderScoreboard(data); updateChatState(data.drawerID, data.correctGuessers || []); });

    socket.on('hintUpdate', hint => {
        if (!isDrawer) {
            document.getElementById('word-display').innerText = hint;
        }
    });

    socket.on('drawData', d => drawStroke(d));
    socket.on('fillData', d => floodFill(d.x, d.y, d.color));
    socket.on('timerUpdate', t => {
        const el = document.getElementById('timer-display');
        el.innerText = t + "s";
        el.style.color = t <= 10 ? '#e74c3c' : '#ffffff';
    });
    socket.on('clearScreen', () => clearWithWhite());
    socket.on('applyState', s => applyState(s, false));

    socket.on('receiveMessage', d => {
        const m = document.getElementById('messages');
        const div = document.createElement('div');
        div.style.cssText = 'padding:3px 0;border-bottom:1px solid #f0f0f0;';
        if (d.user === "SYSTEM") { div.style.color = '#27ae60'; div.style.fontWeight = 'bold'; div.textContent = d.text; }
        else { const b = document.createElement('b'); b.textContent = d.user + ': '; div.appendChild(b); div.appendChild(document.createTextNode(d.text)); }
        m.appendChild(div); m.scrollTop = m.scrollHeight;
    });

    socket.on('gameOver', players => {
        document.getElementById('round-over-screen').classList.remove('show');
        const sorted = Object.values(players).sort((a,b) => b.score - a.score);
        const podium = document.getElementById('podium-list');
        podium.innerHTML = '';
        ['🥇','🥈','🥉'].forEach((medal, i) => {
            if (!sorted[i]) return;
            const p = sorted[i], div = document.createElement('div');
            div.className = 'podium-entry'; div.style.background = p.color;
            div.innerHTML = `<span>${medal}<img src="${p.avatar}" style="width:32px; height:32px; vertical-align:middle; margin:0 8px; border-radius:4px;">${p.nickname}</span><span>${p.score} pts</span>`;
            podium.appendChild(div);
        });
        document.getElementById('game-over-screen').classList.add('show');
    });

    document.getElementById('chat-input').onkeypress = (e) => { if (e.key === 'Enter' && e.target.value.trim()) { socket.emit('chatMessage', e.target.value); e.target.value = ''; } };

    clearWithWhite();
</script>
</body>
</html>
